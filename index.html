<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Echoes of the Ancients</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0a0a12">
<style>
  html,body{margin:0;padding:0;background:#0a0a12;color:#bbb;font-family:monospace;height:100%;overscroll-behavior:none;touch-action:manipulation;-webkit-user-select:none;user-select:none}
  #wrap{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px;padding-bottom:max(14px,env(safe-area-inset-bottom))}
  h1{font-size:15px;color:#ffd75f;letter-spacing:3px;margin:0;text-transform:uppercase}
  #sub{font-size:11px;color:#667}
  canvas{image-rendering:pixelated;border:3px solid #2a2a3a;border-radius:4px;max-width:100%;height:auto;outline:none}
  #bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  button{background:#1a1a2a;color:#aac;border:1px solid #334;padding:5px 12px;font-family:monospace;cursor:pointer;border-radius:3px}
  button:hover{background:#252540}
  #keys{font-size:11px;color:#556;max-width:660px;text-align:center;line-height:1.5}
  b{color:#889}
  /* --- touch controls --- */
  #touch{display:none;width:100%;max-width:100%;justify-content:space-between;align-items:center;gap:12px;margin-top:4px;padding:0 6px;box-sizing:border-box}
  body.touch #touch{display:flex}
  body.touch #keys{display:none}
  body.touch #sub{display:none}
  body.touch #wrap{padding:4px 0 max(10px,env(safe-area-inset-bottom)) 0;gap:4px}
  body.touch canvas{border-width:2px;border-radius:2px;width:100%;box-sizing:border-box}
  body.touch h1{font-size:13px;letter-spacing:2px;padding-top:4px}
  body.touch button{padding:7px 14px;font-size:13px}
  #dpad{display:grid;grid-template-columns:repeat(3,72px);grid-template-rows:repeat(3,72px);gap:5px}
  .dbtn,.abtn{background:#1a1a2a;border:2px solid #36364e;border-radius:12px;color:#9ab;
    font-family:monospace;font-size:26px;display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;touch-action:none}
  .dbtn:active,.abtn:active{background:#3a3a5e;border-color:#66f}
  #abtns{display:flex;flex-direction:column;gap:10px;align-items:flex-end}
  .abtn{width:88px;height:68px;font-size:15px;letter-spacing:1px}
  #btnA{background:#1d2a1d;border-color:#3a5e3a;color:#9f9;width:100px;height:78px;font-size:19px}
  #btnB{background:#2a1d1d;border-color:#5e3a3a;color:#f99}
  /* landscape: canvas left, controls right */
  @media (orientation:landscape) and (max-height:600px){
    body.touch #wrap{flex-direction:row;align-items:flex-start;flex-wrap:wrap;padding:0}
    body.touch canvas{width:auto;height:100svh;flex-shrink:0}
    body.touch #touch{flex-direction:column;width:auto;padding:8px;margin-top:0}
    body.touch #bar{flex-direction:column;padding:4px}
    body.touch h1{display:none}
  }
  @media (max-width:700px){
    h1{font-size:12px;letter-spacing:2px}
    #sub{font-size:9px}
    #wrap{padding:6px;gap:6px}
    canvas{border-width:2px}
  }
</style>
</head>
<body>
<div id="wrap">
  <h1>Echoes of the Ancients</h1>
  <div id="sub">an original tribute to Legacy of the Ancients (Quest/EA, 1987)</div>
  <canvas id="cv" tabindex="0"></canvas>
  <div id="touch">
    <div id="dpad">
      <div></div><div class="dbtn" data-k="ArrowUp">&#9650;</div><div></div>
      <div class="dbtn" data-k="ArrowLeft">&#9664;</div><div></div><div class="dbtn" data-k="ArrowRight">&#9654;</div>
      <div></div><div class="dbtn" data-k="ArrowDown">&#9660;</div><div></div>
    </div>
    <div id="abtns">
      <div class="abtn" data-k="Tab">MAP</div>
      <div class="abtn" id="btnB" data-k="Escape">B</div>
      <div class="abtn" id="btnA" data-k="Enter">A</div>
    </div>
  </div>
  <div id="bar">
    <button onclick="saveGame()">Save</button>
    <button onclick="loadGame()">Load</button>
    <button onclick="toggleSound()" id="sndbtn">Sound: ON</button>
    <button onclick="showHelp()">Help</button>
  </div>
  <div id="keys"><b>Arrows/WASD</b> move &nbsp;<b>Enter/Space</b> confirm &nbsp;<b>Esc</b> cancel &nbsp; In dungeons: <b>&uarr;</b> forward, <b>&larr;&rarr;</b> turn, <b>&darr;</b> step back, <b>Tab</b> map</div>
</div>
<script>
"use strict";
/* ============== core setup ============== */
const PAL=['#000000','#0000aa','#00aa00','#00aaaa','#aa0000','#aa00aa','#aa5500','#aaaaaa',
           '#555555','#5555ff','#55ff55','#55ffff','#ff5555','#ff55ff','#ffff55','#ffffff'];
const Wl=240,Hl=240,S=3;
const SBARY=Hl-24; // status bar y = 216
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
cv.width=Wl*S;cv.height=Hl*S;ctx.imageSmoothingEnabled=false;
function rect(x,y,w,h,c){ctx.fillStyle=PAL[c];ctx.fillRect(Math.round(x*S),Math.round(y*S),Math.round(w*S),Math.round(h*S));}
function poly(pts,c){ctx.fillStyle=PAL[c];ctx.beginPath();ctx.moveTo(pts[0][0]*S,pts[0][1]*S);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0]*S,pts[i][1]*S);ctx.closePath();ctx.fill();}
function txt(s,x,y,c,big){ctx.fillStyle=PAL[c];ctx.font=(big?12*S:8*S)+'px monospace';ctx.textBaseline='top';ctx.fillText(s,x*S,y*S);}
function ctxt(s,y,c,big){const w=(big?7.2:4.8)*s.length;txt(s,(Wl-w)/2,y,c,big);}
const R=(n)=>Math.floor(Math.random()*n);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* ============== sound ============== */
let AC=null,sndOn=true;
function beep(f,d,type,vol,when){if(!sndOn)return;try{AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  const o=AC.createOscillator(),g=AC.createGain();o.type=type||'square';o.frequency.value=f;
  const t=AC.currentTime+(when||0);g.gain.setValueAtTime(vol||.06,t);g.gain.exponentialRampToValueAtTime(.001,t+d);
  o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+d);}catch(e){}}
const sHit=()=>beep(110,.12,'sawtooth',.08);
const sHurt=()=>beep(70,.2,'sawtooth',.09);
const sStep=()=>{};
const sCoin=()=>{beep(880,.07);beep(1320,.1,'square',.05,.07);};
const sLore=()=>{beep(520,.08,'triangle');beep(660,.1,'triangle',.05,.09);};
const sJewel=()=>{[523,659,784,1047].forEach((f,i)=>beep(f,.15,'triangle',.07,i*.12));};
const sDie=()=>{[220,180,140,90].forEach((f,i)=>beep(f,.25,'sawtooth',.08,i*.2));};
const sTitle=()=>{[392,523,659,784,659,1047].forEach((f,i)=>beep(f,.18,'triangle',.06,i*.14));};
function toggleSound(){sndOn=!sndOn;document.getElementById('sndbtn').textContent='Sound: '+(sndOn?'ON':'OFF');cv.focus();}

/* ============== maps ============== */
const OVERWORLD=[

"~~~,,,,t,,,,,,~~~~~,,t,,,,,,,,~~~~~~",

"~~~~~~~~~~=~~~~~~~,,,,,,,,,,,,,~~~~~",
"~~~,,,,,,,=,,,,,,,,,t,,,,,,,s,,~~~~~",
"~~,,t,,,,,,,,,,,,,,tt,,,,,,,ss,~~~~~",
"~~,,tt,,,,,,,,,,,,,,,,^,,,,,,s,,~~~~",
"~~,,,,,,,,,T,,,,,,,,,^^,^^,,,,,,~~~~",
"~~~,,,,,,,,,,,,,,,,,,^^2^^,,,,,,~~~~",
"~~~,t,,,,,,,,,,,,,,,,,^^^,,,,,,~~~~~",
"~~~,tt,,,,,,,,,,t,,,,,,,,,,,,,,~~~~~",

"~~~,,,,,,,,,~~~~~~,,,,~~~~~~~~~~~~~~",
"~~~,s,,,,~~~~~~~~~~~~~~~~~~~~~~~~~~~",
"~~~=~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~",
"~~,1,,~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~",
"~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~"];
const MUSEUM=[
"####################",
"#.A....B....C....D.#",
"#..................#",
"#...####..####.....#",
"#...#........#.....#",
"#...#...Z....#..G..#",
"#...#........#.....#",
"#...####..####.....#",
"#.E....F.......c...#",
"#########+##########"];
const TOWN_BRYN=[
"################",
"#..N....S....I.#",
"#..............#",
"#..##..##..##..#",
"#..............#",
"#.N......N.....#",
"#..............#",
"#....N.....N...#",
"#..............#",
"#######+########"];
const TOWN_SALT=[
"################",
"#.O...S......I.#",
"#..............#",
"#..##....##....#",
"#......N.......#",
"#..N........N..#",
"#..............#",
"#.....N........#",
"#..............#",
"#######+########"];
const DUN1=[
"############",
"#<...#.....#",
"#.##.#.###.#",
"#..#.#...#.#",
"##.#.###.#.#",
"#..#.....#.#",
"#.####.###.#",
"#......#...#",
"#.####.#.#.#",
"#.#....#.#.#",
"#.#.####.#J#",
"############"];
const DUN2=[
"############",
"#<.#.......#",
"#..#.#####.#",
"##.#.#...#.#",
"#..#.#.#.#.#",
"#.##.#.#.#.#",
"#....#.#.#.#",
"#.####.#.#.#",
"#......#.#.#",
"#.######.#.#",
"#........#J#",
"############"];
const DUN3=[
"############",
"#<....#....#",
"###.#.#.##.#",
"#...#.#..#.#",
"#.###.##.#.#",
"#.#....#.#.#",
"#.#.##.#.#.#",
"#.#..#.#.#.#",
"#.##.#.#.#.#",
"#..#.#...#.#",
"##.#...#.#J#",
"############"];

/* walkability */
const SOLID="#~^t";
function walkable(ch){return ch!==undefined && SOLID.indexOf(ch)<0;}

/* ============== game data ============== */
const WEAPONS=[["Fists",0],["Stone Knife",2],["Bronze Sword",5],["Steel Sword",9],["Star Blade",14]];
const ARMOR=[["Clothes",0],["Leather",2],["Chainmail",4],["Plate",7]];
const ENEMIES={
 over:[["Thorn Creeper",8,3,6,4,2],["Wild Dog",10,4,8,6,8],["Highway Bandit",14,5,12,12,12]],
 d1:[["Cave Bat",10,4,9,5,4],["Drowned Pirate",18,6,16,14,12],["Sea Wraith",24,8,22,18,5]],
 d2:[["Rattling Skeleton",20,7,18,12,6],["Pale Ghoul",28,9,26,20,2],["Stone Sentinel",36,11,34,28,8]],
 d3:[["Keep Guard",34,11,32,26,12],["Battle Mage",30,13,38,34,13],["Iron Mauler",46,14,46,40,4]]
};
const BOSSES={
 d1:["The Pirate King",55,12,80,90,12],
 d2:["The Bone Tyrant",75,15,120,120,15],
 d3:["Warlord Vexmar",105,18,200,200,4]
};
const JNAME={d1:"SAPPHIRE",d2:"RUBY",d3:"EMERALD"};
const JCOL={d1:9,d2:12,d3:10};
const HINTS_BRYN=[
 "Keep coin for the Museum gates. Its exhibits open doors no road can.",
 "The catacombs lie under the eastern peaks. Enter from the north slope.",
 "An old salt in Saltmere sells Museum coins... for a price.",
 "Without a torch the deep halls swallow your sight. Buy plenty.",
 "Three jewels bind the Codex: blue, red, and green."];
const HINTS_SALT=[
 "The Pirate King hoards a blue jewel beneath the southern isle.",
 "Cross the rotted bridge south of here at low tide. It held me, once.",
 "Warlord Vexmar's keep lies past the northwest bridge. None return.",
 "Herbs of Juton mend flesh even mid-battle. Never travel without.",
 "They say the Museum healing spring restores a body for one coin."];

/* ============== state ============== */
let G=null;
function newGame(){
 G={state:'title',t:0,
  p:{x:10,y:8,hp:24,mhp:24,mp:6,mmp:6,str:6,intl:5,lvl:1,xp:0,gold:12,coins:2,
     wpn:0,arm:0,herbs:1,torch:0,fuel:0,jewels:{},flags:{}},
  loc:'museum', worldPos:{x:25,y:4},
  dun:null,dx:1,dy:1,dir:1,visited:{},
  text:null,shop:null,combat:null,menuIx:0,msg:"",msgT:0};
}
const MAPS={over:OVERWORLD,museum:MUSEUM,bryn:TOWN_BRYN,salt:TOWN_SALT};
const DUNS={d1:DUN1,d2:DUN2,d3:DUN3};
const DUNNAME={d1:"Grotto of the Pirate King",d2:"Catacombs of Morr",d3:"Vexmar's Keep"};
function curMap(){return MAPS[G.loc];}
function tileAt(m,x,y){return (m[y]||"")[x];}

/* ============== text/lore system ============== */
function showText(pages,then){G.text={pages:pages.map(wrap),ix:0,then:then||null};G.state='text';sLore();}
function wrap(str){const words=str.split(' ');const lines=[];let cur="";
 for(const w of words){if((cur+" "+w).trim().length>36){lines.push(cur.trim());cur=w;}else cur+=" "+w;}
 if(cur.trim())lines.push(cur.trim());return lines;}
function flash(s){G.msg=s;G.msgT=140;}

/* ============== exhibits ============== */
function exhibit(ch){
 const p=G.p,f=p.flags;
 const needCoin=(fn)=>{if(p.coins<1){showText(["The exhibit gate wants a standard Museum coin. You have none. Natives sometimes carry them... and a dealer in Saltmere sells them."]);return;}p.coins--;sCoin();fn();};
 switch(ch){
  case 'A':
   if(!f.knife){f.knife=true;if(p.wpn<1)p.wpn=1;
    showText(["FIRST PEOPLES OF VETHARA","Long before roads, nomads crossed this world with blades of chipped stone. The case stands open, as if expecting you.","As a Museum patron you may borrow this STONE KNIFE for as long as you like. It is now yours."]);}
   else showText(["The stone knife case stands empty. A small card reads: ON LOAN."]);
   break;
  case 'B':
   needCoin(()=>{f.sawMap=true;showText(["THE GREAT TAPESTRY","A woven map of Vethara, the only one its weavers ever finished.","This Museum stands in the NORTHEAST. The pirate isle lies far SOUTHWEST, over a rotted bridge. The catacombs sleep beneath the EASTERN peaks. Across the NORTHWEST bridge broods the keep of Warlord Vexmar.","(Press Tab outdoors to recall the tapestry.)"]);});
   break;
  case 'C':
   if(!f.gift){f.gift=true;p.gold+=20;sCoin();
    showText(["THE CURRENCY ROOM","Gold is scarce on Vethara, which is precisely what makes it heavy with meaning.","The Museum is pleased to extend each new patron a modest grant. 20 GOLD has been added to your purse."]);}
   else showText(["The currency room glitters behind glass. The grant desk is closed."]);
   break;
  case 'D':
   needCoin(()=>{p.hp=p.mhp;p.mp=p.mmp;showText(["THE HEALING SPRING","A replica of the enchanted spring of the old shrines - except, patrons whisper, it is no replica.","You drink. Warmth floods your limbs. You are fully restored."]);});
   break;
  case 'E':
   needCoin(()=>{showText(["EXHIBIT: THE DROWNED GROTTO","A reconstruction of a sea-cave from the southern isles, where pirates buried what they could not spend... guarded by what they could not kill.","The exhibit gate hums. It is not a reconstruction at all. It is a DOOR.","You step through..."],()=>enterDungeon('d1'));});
   break;
  case 'F':
   needCoin(()=>{showText(["EXHIBIT: THE CATACOMBS OF MORR","The rulers of old cast their bravest knights into these twisting halls. The few who climbed out were never beaten in battle again.","The gate hums. You feel cold, deep air on your face.","You step through..."],()=>enterDungeon('d2'));});
   break;
  case 'G':
   if((p.jewels.d1?1:0)+(p.jewels.d2?1:0)>=2)
    needCoin(()=>{showText(["EXHIBIT: THE WARLORD'S GATE","This display was sealed for decades - the Museum's insurers demanded it. For you, patron, it stands open.","Beyond waits Vexmar, who holds the last guard jewel, the EMERALD.","You step through..."],()=>enterDungeon('d3'));});
   else showText(["EXHIBIT: THE WARLORD'S GATE","The shutters are welded shut. A card reads:","SEALED BY ORDER OF THE CARETAKER. Patrons holding fewer than two guard jewels may not view this display."]);
   break;
  case 'Z':{
   const n=(p.jewels.d1?1:0)+(p.jewels.d2?1:0)+(p.jewels.d3?1:0);
   if(n>=3){G.state='victory';G.t=0;sJewel();}
   else showText(["THE CODEX OF STORMS","The leather scroll strains against its case like a living thing. The air tastes of copper.","Only the three guard jewels - SAPPHIRE, RUBY, EMERALD - can bind it forever.","You hold "+n+" of 3."]);
   break;}
  case 'c':{
   const n=(p.jewels.d1?1:0)+(p.jewels.d2?1:0)+(p.jewels.d3?1:0);
   const lines=["\"Welcome, patron. I am the Caretaker. My influence outside these walls is small, but here I may help you.\""];
   if(n===0)lines.push("\"Grow strong in the countryside first. Towns sell steel; natives drop coin. The exhibits E and F are doors, if you carry Museum coins.\"");
   else if(n<3)lines.push("\"You carry "+n+" guard jewel"+(n>1?"s":"")+". Splendid. The Warlord's Gate opens to patrons holding two.\"");
   else lines.push("\"All three jewels! Go to the Codex at the heart of this hall, and end this.\"");
   showText(lines);break;}
 }
}

/* ============== location transitions ============== */
function enterLoc(loc,x,y){G.loc=loc;G.p.x=x;G.p.y=y;G.state='walk';}
function enterDungeon(id){G.dun=id;G.state='dungeon';G.visited={};
 const m=DUNS[id];for(let y=0;y<m.length;y++)for(let x=0;x<m[y].length;x++)if(m[y][x]==='<'){G.dx=x;G.dy=y;}
 G.dir=1;G.visited[G.dx+','+G.dy]=1;
 flash(DUNNAME[id]);}
const DUNGATE={d1:{x:3,y:20},d2:{x:23,y:10},d3:{x:5,y:2}};
function exitDungeon(){const g=DUNGATE[G.dun];G.loc='over';G.p.x=g.x;G.p.y=g.y;G.dun=null;G.state='walk';flash("You emerge into daylight.");}

/* ============== walking ============== */
function tryMove(dx,dy){
 const p=G.p,m=curMap();
 const nx=p.x+dx,ny=p.y+dy;
 const ch=tileAt(m,nx,ny);
 if(!walkable(ch))return;
 /* interactables that don't move you */
 if(G.loc==='museum'&&"ABCDEFGZc".indexOf(ch)>=0){exhibit(ch);return;}
 if((G.loc==='bryn'||G.loc==='salt')){
  if(ch==='N'){npcTalk(nx,ny);return;}
  if(ch==='S'){openShop();return;}
  if(ch==='I'){inn();return;}
  if(ch==='O'){coinDealer();return;}
 }
 p.x=nx;p.y=ny;
 if(G.loc==='over'){
  if(ch==='M'){enterLoc('museum',10,8);flash("The Star Museum");return;}
  if(ch==='T'){G.worldPos={x:nx,y:ny};enterLoc('bryn',7,8);flash("The town of Bryn");return;}
  if(ch==='U'){G.worldPos={x:nx,y:ny};enterLoc('salt',7,8);flash("The town of Saltmere");return;}
  if(ch==='1'){enterDungeon('d1');return;}
  if(ch==='2'){enterDungeon('d2');return;}
  if(ch==='3'){enterDungeon('d3');return;}
  if(R(100)<8&&(ch===','||ch==='t'))startCombat('over',false);
 } else if(ch==='+'){
  if(G.loc==='museum'){enterLoc('over',25,5);flash("Vethara - the open road");}
  else {enterLoc('over',G.worldPos.x,G.worldPos.y+1===22?G.worldPos.y:G.worldPos.y);const g=G.worldPos;G.p.x=g.x;G.p.y=g.y;flash("The open road");}
 }
}
function npcTalk(x,y){
 const list=G.loc==='bryn'?HINTS_BRYN:HINTS_SALT;
 const m=curMap();let ix=0,n=0;
 for(let yy=0;yy<m.length;yy++)for(let xx=0;xx<m[yy].length;xx++){if(m[yy][xx]==='N'){if(xx===x&&yy===y)ix=n;n++;}}
 showText(['"'+list[ix%list.length]+'"']);
}
function inn(){const p=G.p;
 if(p.gold<5){showText(["\"Beds are 5 gold, traveler. Come back when your purse is heavier.\""]);return;}
 p.gold-=5;p.hp=p.mhp;p.mp=p.mmp;sCoin();showText(["You sleep deeply. HP and MP fully restored."]);}
function coinDealer(){const p=G.p;
 if(p.gold<10){showText(["\"Museum coins, genuine ancient mint! 10 gold each. No credit.\""]);return;}
 p.gold-=10;p.coins++;sCoin();showText(["You buy a Museum coin. (\""+"Genuine ancient mint,\" he insists.)","Coins: "+p.coins]);}
function openShop(){
 const tier=G.loc==='bryn'?1:2;
 const items=[];
 if(tier===1){items.push(['w',2,"Bronze Sword",25],['a',1,"Leather Armor",20]);}
 else{items.push(['w',3,"Steel Sword",80],['w',4,"Star Blade",220],['a',2,"Chainmail",70],['a',3,"Plate Armor",180]);}
 items.push(['h',0,"Juton Herb (+20HP)",8],['t',0,"Torch (100 steps)",6]);
 G.shop={items,ix:0};G.state='shop';
}
function buy(){
 const it=G.shop.items[G.shop.ix],p=G.p;
 if(p.gold<it[3]){flash("Not enough gold!");return;}
 if(it[0]==='w'){if(p.wpn>=it[1]){flash("You own a better weapon.");return;}p.wpn=it[1];}
 if(it[0]==='a'){if(p.arm>=it[1]){flash("You own better armor.");return;}p.arm=it[1];}
 if(it[0]==='h'){if(p.herbs>=9){flash("You can carry 9 herbs.");return;}p.herbs++;}
 if(it[0]==='t'){p.torch++;}
 p.gold-=it[3];sCoin();flash("Purchased: "+it[2]);
}

/* ============== dungeon mode ============== */
function dunCell(x,y){return tileAt(DUNS[G.dun],x,y);}
const DIRS=[[0,-1],[1,0],[0,1],[-1,0]]; // N E S W
function dunStep(fwd){
 const d=DIRS[G.dir],nx=G.dx+d[0]*fwd,ny=G.dy+d[1]*fwd;
 const ch=dunCell(nx,ny);
 if(ch===undefined||ch==='#'){sHurt();flash("A wall blocks the way.");return;}
 G.dx=nx;G.dy=ny;G.visited[nx+','+ny]=1;
 if(G.p.torch>0){G.p.fuel++;if(G.p.fuel>=100){G.p.fuel=0;G.p.torch--;flash(G.p.torch>0?"A torch gutters out. ("+G.p.torch+" left)":"Your last torch dies!");}}
 if(ch==='<'){exitDungeon();return;}
 if(ch==='J'&&!G.p.jewels[G.dun]){startCombat(G.dun,true);return;}
 if(R(100)<13)startCombat(G.dun,false);
}

/* ============== combat ============== */
function startCombat(area,boss){
 let e;
 if(boss)e=BOSSES[area].slice();
 else{const t=ENEMIES[area];e=t[R(t.length)].slice();
  const lv=G.p.lvl-1;e[1]+=lv*2;e[2]+=Math.floor(lv/2);}
 G.combat={name:e[0],hp:e[1],mhp:e[1],atk:e[2],xp:e[3],gold:e[4],col:e[5],boss:!!boss,area,
   seed:R(99999),log:["A "+e[0]+" attacks!"],phase:'menu',sub:null};
 G.state='combat';G.menuIx=0;beep(196,.15,'sawtooth',.08);
}
function clog(s){const c=G.combat;c.log.push(s);if(c.log.length>4)c.log.shift();}
function playerAtk(){
 const p=G.p,c=G.combat;
 const wp=WEAPONS[p.wpn][1];
 const dmg=Math.max(1,R(p.str+wp)+Math.floor((p.str+wp)/2)-R(3));
 c.hp-=dmg;sHit();clog("You strike for "+dmg+"!");
 endPlayerTurn();
}
function castSpell(n){
 const p=G.p,c=G.combat;
 if(n===1){if(p.mp<4){clog("Not enough MP!");return;}p.mp-=4;
  const dmg=p.intl+R(p.intl)+2;c.hp-=dmg;sHit();clog("Firebolt sears for "+dmg+"!");}
 else{if(p.mp<3){clog("Not enough MP!");return;}p.mp-=3;
  const h=15+R(6);p.hp=Math.min(p.mhp,p.hp+h);sCoin();clog("Mend restores "+h+" HP.");}
 c.sub=null;endPlayerTurn();
}
function useHerb(){
 const p=G.p;
 if(p.herbs<1){clog("No herbs left!");return;}
 p.herbs--;const h=20;p.hp=Math.min(p.mhp,p.hp+h);sCoin();clog("The herb restores "+h+" HP.");
 endPlayerTurn();
}
function tryRun(){
 const c=G.combat;
 if(c.boss){clog("There is no escape!");endPlayerTurn();return;}
 if(R(100)<55){G.state=G.combat.area==='over'?'walk':'dungeon';G.combat=null;flash("You slip away!");}
 else{clog("You fail to escape!");endPlayerTurn();}
}
function endPlayerTurn(){
 const c=G.combat,p=G.p;
 if(c.hp<=0){win();return;}
 const dmg=Math.max(0,R(c.atk+2)-Math.floor(ARMOR[p.arm][1]/1.5)-R(2));
 if(dmg>0){p.hp-=dmg;sHurt();clog("The "+c.name+" hits for "+dmg+"!");}
 else clog("The "+c.name+" misses!");
 if(p.hp<=0){p.hp=0;G.state='dead';G.t=0;sDie();}
}
function win(){
 const c=G.combat,p=G.p;
 p.xp+=c.xp;p.gold+=c.gold;
 let s="Victory! +"+c.xp+" XP, +"+c.gold+" gold.";
 if(!c.boss&&R(100)<18){p.coins++;s+=" Found a Museum coin!";}
 sCoin();
 const need=50*Math.pow(2,p.lvl-1);
 if(p.xp>=need){p.lvl++;p.mhp+=7;p.hp=p.mhp;p.mmp+=3;p.mp=p.mmp;p.str+=2;p.intl+=2;
  s+=" LEVEL UP! You are now level "+p.lvl+".";sJewel();}
 if(c.boss){
  p.jewels[c.area]=true;sJewel();
  showText(["The "+c.name+" falls. In the silence, light wells up from the hoard:","The "+JNAME[c.area]+" - a guard jewel of the Codex!","("+((p.jewels.d1?1:0)+(p.jewels.d2?1:0)+(p.jewels.d3?1:0))+" of 3 jewels held. Return them to the Codex exhibit in the Star Museum.)"],
   ()=>{G.state='dungeon';});
  G.combat=null;flash(s);return;
 }
 G.state=c.area==='over'?'walk':'dungeon';G.combat=null;flash(s);
}

  case 'walk':{

   else if(k==='ArrowLeft'||k==='a'||k==='A')dx=-1;else if(k==='ArrowRight'||k==='d'||k==='D')dx=1;

   break;}
  case 'bigmap': G.state='walk';break;
  case 'dungeon':{
   if(k==='ArrowUp'||k==='w'||k==='W')dunStep(1);
   else if(k==='ArrowDown'||k==='s'||k==='S')dunStep(-1);
   else if(k==='ArrowLeft'||k==='a'||k==='A'){G.dir=(G.dir+3)%4;}
   else if(k==='ArrowRight'||k==='d'||k==='D'){G.dir=(G.dir+1)%4;}
   else if(k==='Tab')G.state='dunmap';
   else if(k==='v'||k==='V')saveGame();
   else if(k==='h'||k==='H')showHelp();
   break;}
  case 'dunmap': G.state='dungeon';break;
  case 'shop':{
   if(k==='ArrowUp'||k==='w'||k==='W')G.shop.ix=(G.shop.ix+G.shop.items.length-1)%G.shop.items.length;
   else if(k==='ArrowDown'||k==='s'||k==='S')G.shop.ix=(G.shop.ix+1)%G.shop.items.length;
   else if(enter)buy();
   else if(k==='Escape'){G.state='walk';G.shop=null;}
   break;}
  case 'combat':{
   const c=G.combat;
   if(c.sub==='spell'){
    if(k==='1')castSpell(1);else if(k==='2')castSpell(2);
    else if(k==='ArrowUp'||k==='ArrowDown'||k==='w'||k==='W'||k==='s'||k==='S')c.spellIx=1-(c.spellIx||0);
    else if(enter)castSpell((c.spellIx||0)+1);
    else if(k==='Escape')c.sub=null;
    break;}
   if(k==='ArrowUp'||k==='w'||k==='W')G.menuIx=(G.menuIx+3)%4;
   else if(k==='ArrowDown'||k==='s'||k==='S')G.menuIx=(G.menuIx+1)%4;

   break;}
  case 'dead': if(enter){const p=G.p;p.gold=Math.floor(p.gold/2);p.hp=p.mhp;p.mp=p.mmp;
    G.dun=null;G.combat=null;enterLoc('museum',10,8);

  case 'victory': break;
 }
});

function drawTile(ch,px,py,t){
 const x=px,y=py;
 switch(ch){
  case '~':{rect(x,y,16,16,1);const ph=(t>>4)%2;rect(x+2,y+4+ph,5,1,9);rect(x+9,y+10-ph,5,1,9);break;}
  case ',':{rect(x,y,16,16,2);rect(x+3,y+3,1,2,10);rect(x+11,y+8,1,2,10);rect(x+6,y+12,1,2,10);break;}
  case 's':{rect(x,y,16,16,14);rect(x+4,y+5,2,1,6);rect(x+10,y+11,2,1,6);break;}
  case 't':{rect(x,y,16,16,2);rect(x+6,y+9,4,5,6);poly([[x+8,y+1],[x+14,y+10],[x+2,y+10]],10);poly([[x+8,y+3],[x+13,y+10],[x+3,y+10]],2);break;}
  case '^':{rect(x,y,16,16,2);poly([[x+8,y+1],[x+15,y+14],[x+1,y+14]],8);poly([[x+8,y+1],[x+11,y+7],[x+5,y+7]],15);break;}
  case '=':{rect(x,y,16,16,1);rect(x+3,y,10,16,6);rect(x+4,y,1,16,14);rect(x+11,y,1,16,14);break;}
  case '#':{rect(x,y,16,16,4);for(let r=0;r<4;r++){rect(x,y+r*4,16,1,0);rect(x+(r%2?2:9),y+r*4,1,4,0);}break;}
  case '.':{rect(x,y,16,16,8);rect(x,y,16,1,7);rect(x,y,1,16,7);break;}
  case '+':{rect(x,y,16,16,8);rect(x+3,y+1,10,14,6);rect(x+5,y+3,6,5,14);rect(x+11,y+8,2,2,14);break;}
  case 'M':{rect(x,y,16,16,2);rect(x+1,y+6,14,9,7);poly([[x+8,y],[x+16,y+6],[x,y+6]],14);rect(x+6,y+9,4,6,1);rect(x+2,y+8,2,3,11);rect(x+12,y+8,2,3,11);break;}
  case 'T': case 'U':{rect(x,y,16,16,2);rect(x+2,y+8,5,7,6);rect(x+9,y+6,5,9,7);poly([[x+4,y+4],[x+8,y+8],[x,y+8]],4);poly([[x+11,y+2],[x+15,y+6],[x+7,y+6]],4);break;}
  case '1': case '2': case '3':{const bg=ch==='2'?8:2;rect(x,y,16,16,bg);poly([[x+8,y+2],[x+15,y+15],[x+1,y+15]],8);rect(x+5,y+8,6,7,0);break;}
  case 'A':case 'B':case 'C':case 'D':case 'E':case 'F':case 'G':{
   rect(x,y,16,16,8);rect(x+2,y+2,12,12,7);rect(x+3,y+3,10,8,1);
   txt(ch,x+5.5,y+3.5,14);rect(x+5,y+12,6,2,6);break;}
  case 'Z':{rect(x,y,16,16,8);rect(x+1,y+1,14,14,5);rect(x+3,y+3,10,10,0);rect(x+5,y+5,6,6,13);rect(x+7,y+7,2,2,15);break;}
  case 'c':{rect(x,y,16,16,8);rect(x+5,y+2,6,5,11);rect(x+4,y+7,8,7,3);rect(x+6,y+4,1,1,0);rect(x+9,y+4,1,1,0);break;}
  case 'N':{rect(x,y,16,16,8);rect(x+5,y+2,6,5,14);rect(x+4,y+7,8,7,4);rect(x+6,y+4,1,1,0);rect(x+9,y+4,1,1,0);break;}
  case 'O':{rect(x,y,16,16,8);rect(x+5,y+2,6,5,14);rect(x+4,y+7,8,7,5);rect(x+6,y+4,1,1,0);rect(x+9,y+4,1,1,0);break;}
  case 'S':{rect(x,y,16,16,8);rect(x+2,y+2,12,12,6);txt("$",x+5.5,y+4,14);break;}
  case 'I':{rect(x,y,16,16,8);rect(x+2,y+2,12,12,3);rect(x+4,y+8,8,4,15);rect(x+4,y+6,3,2,12);break;}
  default: rect(x,y,16,16,0);
 }
}

  rect(152,112,84,46,8);rect(154,114,80,42,0);
  for(let i=0;i<4;i++)txt((G.menuIx===i?">":" ")+items[i],158,117+i*10,G.menuIx===i?14:7);
 }
 statusBar();
}
function drawShop(){
 rect(0,0,Wl,Hl,0);
 ctxt("GENERAL STORE - "+(G.loc==='bryn'?'BRYN':'SALTMERE'),12,14);
 ctxt("gold: "+G.p.gold,24,14);
 const its=G.shop.items;
 for(let i=0;i<its.length;i++){
  const sel=i===G.shop.ix;
  txt((sel?"> ":"  ")+its[i][2],60,44+i*12,sel?15:7);
  txt(its[i][3]+"g",185,44+i*12,sel?14:6);
 }
 ctxt("Enter to buy - Esc to leave",200,8);
 statusBar();
}
function drawText(){
 const t=G.text,lines=t.pages[t.ix];
 rect(0,0,Wl,Hl,0);
 rect(6,6,Wl-12,Hl-12,1);rect(8,8,Wl-16,Hl-16,0);
 let y=Math.max(16,120-lines.length*6);
 for(const ln of lines){txt(ln,20,y,15);y+=11;}
 txt("Enter...",Wl-44,Hl-16,8);
 txt((t.ix+1)+"/"+t.pages.length,16,Hl-16,8);
}
function drawTitle(){
 rect(0,0,Wl,Hl,0);
 /* starfield */
 let s=12345;const rnd=()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};
 for(let i=0;i<70;i++){const x=rnd()*Wl,y=rnd()*90;rect(x,y,1,1,(i+(G.t>>4))%9===0?15:8);}
 /* museum silhouette */
 rect(45,92,150,38,8);poly([[120,62],[203,92],[38,92]],7);
 for(let i=0;i<6;i++)rect(57+i*24,100,7,30,0);
 rect(0,130,Wl,4,8);
 ctxt("ECHOES OF THE",24,11,true);
 ctxt("ANCIENTS",40,14,true);
 ctxt("an original tribute to",170,7);
 ctxt("Legacy of the Ancients (1987)",182,7);
 if((G.t>>4)%2)ctxt("- press Enter -",206,15);
}
function drawDead(){
 rect(0,0,Wl,Hl,0);
 ctxt("YOU HAVE FALLEN",70,12,true);
 ctxt("...but the Museum never loses a patron.",110,7);
 ctxt("press Enter",140,15);
}
function drawVictory(){
 rect(0,0,Wl,Hl,0);
 const t=G.t;
 for(let i=0;i<3;i++){
  const c=[9,12,10][i];
  rect(72+i*39,60+Math.sin((t/20)+i*2)*6,18,18,c);
  rect(77+i*39,66+Math.sin((t/20)+i*2)*6,9,9,15);
 }
 ctxt("THE CODEX IS BOUND",18,14,true);
 ctxt("Sapphire, Ruby and Emerald blaze in their settings.",104,7);
 ctxt("The leather scroll goes still at last.",114,7);
 ctxt("The Caretaker pins the Galactic Medal of Honor",130,11);
 ctxt("to your chest. \"Only a handful of explorers across",140,11);
 ctxt("the galaxy have earned this. Wear it with pride.\"",150,11);
 ctxt("VETHARA IS SAVED.  Lv"+G.p.lvl+"  Gold "+G.p.gold,170,15);
 ctxt("thanks for playing this tribute remaster",188,8);
}

/* ============== main loop ============== */
function frame(){
 if(G){
  G.t++;if(G.msgT>0)G.msgT--;
  switch(G.state){
   case 'title':drawTitle();break;
   case 'walk':drawWalk();break;
   case 'bigmap':drawBigMap();break;
   case 'dungeon':drawDungeon();break;
   case 'dunmap':drawDunMap();break;
   case 'combat':drawCombat();break;
   case 'shop':drawShop();break;
   case 'text':drawText();break;
   case 'dead':drawDead();break;
   case 'victory':drawVictory();break;
  }
 }
 requestAnimationFrame(frame);
}
/* ============== touch controls ============== */
try{
 if(('ontouchstart' in window)||((navigator&&navigator.maxTouchPoints)||0)>0)
  document.body.classList.add('touch');
 const press=k=>{try{window.dispatchEvent(new KeyboardEvent('keydown',{key:k,cancelable:true}));}catch(e){}};
 const unlock=()=>{try{AC=AC||new (window.AudioContext||window.webkitAudioContext)();if(AC&&AC.state==='suspended')AC.resume();}catch(e){}};
 window.addEventListener('pointerdown',unlock);
 let rep=null;
 document.querySelectorAll('.dbtn,.abtn').forEach(b=>{
  const k=b.dataset.k;
  b.addEventListener('pointerdown',e=>{e.preventDefault();press(k);
   if(b.classList.contains('dbtn')){clearInterval(rep);rep=setInterval(()=>press(k),170);}});
  ['pointerup','pointerleave','pointercancel'].forEach(ev=>b.addEventListener(ev,()=>{clearInterval(rep);rep=null;}));
  b.addEventListener('contextmenu',e=>e.preventDefault());
 });
}catch(e){}
newGame();
cv.focus();
cv.addEventListener('click',()=>cv.focus());
requestAnimationFrame(frame);
</script>
